<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prompt Architect | Lunabella 公开版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .active-scale:active { transform: scale(0.98); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        #root:empty { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconSVG = ({ path, className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={path} /></svg>
        );

        const Icons = {
            Sparkles: (p) => <IconSVG path="M9 3L11 9L17 11L11 13L9 19L7 13L1 11L7 9Z" {...p} />,
            Activity: (p) => <IconSVG path="M22 12h-4l-3 9L9 3l-3 9H2" {...p} />,
            Copy: (p) => <IconSVG path="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2M14 2H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z" {...p} />,
            Check: (p) => <IconSVG path="M20 6L9 17l-5-5" {...p} />,
            Refresh: (p) => <IconSVG path="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" {...p} />,
            Brain: (p) => <IconSVG path="M9.5 2A5 5 0 0 1 12 4a5 5 0 0 1 2.5-2 5 5 0 0 1 5 5 5 5 0 0 1-5 5h-5a5 5 0 0 1-5-5 5 5 0 0 1 5-5z M12 12v10 M8 22h8" {...p} />
        };

        const App = () => {
            const [step, setStep] = useState('input');
            const [userInput, setUserInput] = useState('');
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [result, setResult] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [copied, setCopied] = useState(false);
            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('PA_PUB_CONF_V2') || '{"key":""}'));
            const [showSettings, setShowSettings] = useState(!config.key);

            useEffect(() => { localStorage.setItem('PA_PUB_CONF_V2', JSON.stringify(config)); }, [config]);

            const callAI = async (prompt, system = "") => {
                const res = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                    body: JSON.stringify({ 
                        model: "deepseek-ai/DeepSeek-V3", 
                        messages: [
                            { role: "system", content: system },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "API Error");
                return data.choices[0].message.content;
            };

            const handleStart = async () => {
                if (!userInput.trim()) return;
                setIsLoading(true); setStep('analyzing');
                try {
                    // 核心修复：显式要求使用中文提问
                    const res = await callAI(
                        `针对以下需求，请使用中文提出2-3个关键问题以消除歧义。需求：${userInput}。输出格式：严格 JSON 数组，例如 ["问题1", "问题2"]。`,
                        "你是一个专业的提示词架构师，无论用户输入什么语言，你都必须使用中文进行提问和回复。"
                    );
                    setQuestions(JSON.parse(res.replace(/```json|```/g, '').trim()));
                    setStep('questioning');
                } catch (e) { alert("配置错误或额度不足"); setStep('input'); } finally { setIsLoading(false); }
            };

            const handleGenerate = async () => {
                setIsLoading(true);
                try {
                    const ctx = `原始需求：${userInput}\n补充细节：${JSON.stringify(answers)}`;
                    const res = await callAI(
                        ctx, 
                        "提示词架构师。构建包含角色设定、背景、任务描述、负向约束和输出格式的专业 Prompt。使用 Markdown 格式。请确保整个提示词框架使用中文编写。"
                    );
                    setResult(res); setStep('result');
                } catch (e) { alert("生成失败"); } finally { setIsLoading(false); }
            };

            const copyToClipboard = () => {
                const el = document.createElement('textarea'); el.value = result;
                document.body.appendChild(el); el.select(); document.execCommand('copy');
                document.body.removeChild(el); setCopied(true); setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-2xl mx-auto px-6 py-12 md:py-20 text-center">
                    <header className="mb-12">
                        <div className="inline-flex items-center gap-2 px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest mb-4">
                            <Icons.Sparkles size={12}/> Powered by Lunabella
                        </div>
                        <h1 className="font-black text-3xl uppercase tracking-tighter italic text-slate-900 leading-none">Prompt Architect</h1>
                        <p className="text-slate-400 text-xs mt-2 font-medium italic underline underline-offset-4 decoration-indigo-200">把普通想法升级为大师级指令</p>
                    </header>

                    <div className="relative">
                        {step === 'input' && (
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 animate-in fade-in zoom-in-95 duration-500">
                                <textarea 
                                    className="w-full h-44 p-6 bg-slate-50 border-2 border-slate-100 rounded-[2rem] outline-none focus:border-indigo-500 mb-6 transition-all text-sm leading-relaxed" 
                                    placeholder="输入你的原始想法，例如：帮我写一个年度述职报告的提纲..." 
                                    value={userInput} 
                                    onChange={e => setUserInput(e.target.value)} 
                                />
                                <button 
                                    onClick={handleStart} 
                                    disabled={!userInput.trim() || !config.key}
                                    className="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] active-scale shadow-2xl flex items-center justify-center gap-2 disabled:opacity-30 transition-all hover:bg-indigo-600"
                                >
                                    ⚡ 开始架构分析
                                </button>
                                <p className="mt-4 text-[10px] text-slate-400 uppercase tracking-widest">Designed by Lunabella for AI Creators</p>
                            </div>
                        )}

                        {step === 'analyzing' && (
                            <div className="py-24 animate-pulse">
                                <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icons.Activity className="text-indigo-600 animate-spin" size={32}/>
                                </div>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Architect is thinking...</p>
                            </div>
                        )}

                        {step === 'questioning' && (
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 text-left animate-in slide-in-from-right-4 duration-300">
                                <h3 className="font-black text-sm uppercase text-indigo-600 mb-6 flex items-center gap-2">
                                    <Icons.Brain size={18}/> 为了更精准，请补充：
                                </h3>
                                <div className="space-y-6">
                                    {questions.map((q, i) => (
                                        <div key={i}>
                                            <label className="block text-xs font-bold text-slate-500 mb-2 uppercase">{q}</label>
                                            <input 
                                                type="text" 
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-indigo-500 transition-all" 
                                                onChange={e => setAnswers({...answers, [q]: e.target.value})}
                                                placeholder="..."
                                            />
                                        </div>
                                    ))}
                                </div>
                                <button 
                                    onClick={handleGenerate}
                                    className="w-full mt-10 bg-indigo-600 text-white font-black py-5 rounded-[2rem] active-scale shadow-lg"
                                >
                                    生成最终提示词
                                </button>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="space-y-6 animate-in zoom-in-95 duration-300">
                                <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden text-left">
                                    <div className="bg-slate-900 px-8 py-4 flex justify-between items-center">
                                        <span className="text-white font-black text-[10px] uppercase tracking-widest">Optimized Prompt</span>
                                        <button 
                                            onClick={copyToClipboard}
                                            className="bg-white text-slate-900 px-4 py-1.5 rounded-lg text-[10px] font-black flex items-center gap-2 active-scale"
                                        >
                                            {copied ? <><Icons.Check size={12}/> 已复制</> : <><Icons.Copy size={12}/> 复制内容</>}
                                        </button>
                                    </div>
                                    <div className="p-8 prose prose-sm max-w-none prose-slate">
                                        <div dangerouslySetInnerHTML={{ __html: window.marked.parse(result) }} />
                                    </div>
                                </div>
                                <button 
                                    onClick={() => { setStep('input'); setResult(''); setAnswers({}); }} 
                                    className="inline-flex items-center gap-2 text-xs font-bold text-slate-400 uppercase hover:text-indigo-600 transition-colors"
                                >
                                    <Icons.Refresh size={14}/> 开启新任务
                                </button>
                            </div>
                        )}
                    </div>

                    <button 
                        onClick={() => setShowSettings(true)} 
                        className="fixed bottom-8 right-8 w-12 h-12 bg-white border border-slate-200 rounded-full shadow-lg flex items-center justify-center active-scale text-slate-400 hover:text-indigo-600 transition-colors"
                    >
                        ⚙️
                    </button>

                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-xs p-8 shadow-2xl animate-in zoom-in-95 duration-200 text-center">
                                <h3 className="font-black text-xl mb-4 text-slate-800 uppercase tracking-tight">API Setup</h3>
                                <p className="text-[10px] text-slate-400 mb-6 leading-relaxed">
                                    由 Lunabella 推荐使用硅基流动 (SiliconFlow)<br/>
                                    注册领额度：<a href="https://cloud.siliconflow.cn/i/aVSKHmR1" target="_blank" className="text-indigo-600 underline">点击跳转注册</a>
                                </p>
                                <input 
                                    type="password" 
                                    value={config.key} 
                                    onChange={e => setConfig({key: e.target.value})} 
                                    className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl text-sm font-mono outline-none focus:border-indigo-500 mb-6" 
                                    placeholder="粘贴 sk- 开头的 Key..." 
                                />
                                <button 
                                    onClick={() => setShowSettings(false)} 
                                    className="w-full bg-slate-900 text-white font-black py-4 rounded-xl active-scale"
                                >
                                    保存并锁定配置
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
